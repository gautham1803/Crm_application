<html lang="en" data-theme="dark">

    <meta name="theme-color" content="#060A10" />

    <!-- Fonts: Syne (display), DM Sans (body), JetBrains Mono (numbers) -->

    <!-- FOUC prevention -->

      html { background: #060A10; }
